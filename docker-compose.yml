services:
  app:
    build: .
    container_name: notification-delay-app
    ports:
      - "8027:8000"
    volumes:
      - .:/app
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: notification-delay-mysql
    restart: always
    environment:
      MYSQL_DATABASE: notification_delay_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: notification-delay-phpmyadmin
    restart: always
    ports:
      - "8087:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql